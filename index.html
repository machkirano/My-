<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Assistant OFPPT Ultra Final ⚡</title>
<!-- PWA & SEO -->
<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><text y='.9em' font-size='80'>⚡</text></svg>">

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');

:root {
  --bg:#0b0f1a; --surface:#111827; --surface2:#1a2234;
  --border:#2d3a52; --accent:#00d084; --accent-dark:#00a366;
  --accent-orange:#f97316; --accent2:#38bdf8;
  --accent3:#facc15; --text:#e6edf3; --muted:#8b949e;
  --danger:#f85149; --purple:#a78bfa; --pink:#f472b6;
  --success:#22c55e; --warning:#f59e0b;
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter', 'Tajawal', sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.header{background:linear-gradient(135deg,#0b0f1a,#111827);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:200;backdrop-filter:blur(20px);flex-shrink:0;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#c9271e,#006233);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 15px rgba(0,208,132,0.15);flex-shrink:0;}
.header-info h1{font-size:16px;font-weight:700;color:var(--accent);}
.header-info p{font-size:10px;color:var(--muted);}
.header-spacer{flex:1;}

/* TABS BAR */
.tabs-bar{display:flex;gap:4px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;white-space:nowrap;z-index:150;flex-shrink:0;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab-btn:hover{background:var(--surface2);color:var(--text);}
.tab-btn.active{background:rgba(0,208,132,0.1);border-color:rgba(0,208,132,0.3);color:var(--accent);}

/* MAIN CONTENT */
.main-container{flex:1;display:flex;overflow:hidden;position:relative;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow-y:auto;width:100%;padding-bottom:20px;}
.tab-panel.active{display:flex;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(13,17,23,0.5);}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg{display:flex;gap:12px;animation:fadeInUp 0.3s ease;align-items:flex-end;max-width:90%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.msg.bot{align-self:flex-start;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.msg.user .avatar{background:linear-gradient(135deg,#c9271e,#006233);}
.msg.bot  .avatar{background:linear-gradient(135deg,#1a3a2a,#0a2535);border:1px solid var(--accent);}

.msg-bubble{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word;position:relative;max-width:100%;}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(0,208,132,0.15),rgba(34,211,238,0.1));border:1.5px solid rgba(0,208,132,0.3);border-bottom-right-radius:4px;color:var(--text);}
.msg.bot  .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 4px 15px rgba(0,0,0,0.25);}

/* INPUT AREA - FIXED POSITION FOR MOBILE */
.input-area{
  padding:12px 16px calc(12px + var(--safe-bottom));
  background:var(--bg);
  border-top:1px solid var(--border);
  flex-shrink:0;
  position: relative;
  z-index: 100;
}
.input-wrapper{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:all 0.2s;}
.input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,208,132,0.1);}
.input-wrapper textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;resize:none;max-height:120px;line-height:1.5;}
.send-btn{width:38px;height:38px;border-radius:10px;background:var(--accent);border:none;color:#000;font-size:18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);background:var(--accent-dark);}

/* EXAM BANK */
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:16px;padding:20px;}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all 0.3s;}
.exam-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.exam-header{display:flex;justify-content:space-between;margin-bottom:12px;align-items:center;}
.exam-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;}
.badge-efm{background:rgba(34,211,238,0.1);color:var(--accent2);}
.badge-efe{background:rgba(167,139,250,0.1);color:var(--purple);}
.exam-title{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text);}
.exam-meta{font-size:12px;color:var(--muted);margin-bottom:16px;}
.exam-actions{display:flex;gap:8px;}

/* SIMULATOR */
.sim-container{display:flex;flex:1;overflow-y:auto;padding:20px;gap:20px;flex-wrap:wrap;}
.sim-canvas-area{flex:2;min-width:300px;min-height:300px;background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sim-controls{flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:20px;}

/* VIDEO LIBRARY */
.vlib-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:16px;padding:20px;}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.3s;}

/* UTILS */
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:12px 24px;border-radius:12px;font-size:13px;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.4);animation:toastIn 0.3s ease;display:none;}
@keyframes toastIn{from{transform:translate(-50%, 20px);opacity:0}to{transform:translate(-50%, 0);opacity:1}}

/* MOBILE FIXES */
@media(max-width:768px){
  .sim-container{flex-direction:column;}
  .sim-controls{width:100%;}
  .msg{max-width:95%;}
  .header-info p{display:none;}
  .tabs-bar{padding:6px 8px;}
  .tab-btn{padding:6px 12px;font-size:12px;}
  .input-area { padding-bottom: calc(20px + var(--safe-bottom)); } /* More space for navigation bar */
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚡</div>
  <div class="header-info">
    <h1 id="txt-app-title">Assistant OFPPT Ultra</h1>
    <p id="txt-app-sub">GE & GEn • Plateforme Intelligente</p>
  </div>
  <div class="header-spacer"></div>
  <div class="lang-selector" style="display:flex; gap:8px;">
    <button class="tab-btn active" id="btn-lang-fr" onclick="setLang('fr')">FR</button>
    <button class="tab-btn" id="btn-lang-ar" onclick="setLang('ar')">AR</button>
  </div>
</div>

<!-- TOP TABS NAVIGATION -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('chat', this)">💬 <span id="txt-tab-chat">Chat IA</span></button>
  <button class="tab-btn" onclick="switchTab('exams', this)">📄 <span id="txt-tab-exams">Examens</span></button>
  <button class="tab-btn" onclick="switchTab('simulator', this)">🔧 <span id="txt-tab-sim">Simulateur</span></button>
  <button class="tab-btn" onclick="switchTab('videos', this)">🎥 <span id="txt-tab-videos">Vidéos</span></button>
  <button class="tab-btn" onclick="switchTab('exercises', this)">✏️ <span id="txt-tab-ex">Exercices</span></button>
</div>

<!-- MAIN CONTENT -->
<div class="main-container">
  
  <!-- TAB: CHAT -->
  <div class="tab-panel active" id="panel-chat" style="overflow:hidden; padding-bottom:0;">
    <div class="chat-area">
      <div class="messages" id="chat-messages">
        <div class="welcome-card" style="text-align:center; padding:40px 20px;">
          <div class="big-emoji" style="font-size:50px; margin-bottom:15px;">🚀</div>
          <h2 id="txt-welcome-title" style="color:var(--accent); margin-bottom:10px;">Bienvenue sur l'Assistant OFPPT</h2>
          <p id="txt-welcome-desc" style="color:var(--muted); max-width:500px; margin:0 auto 20px;">Posez vos questions techniques sur le Génie Électrique ou Énergétique.</p>
          <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="tab-btn" onclick="sendQuick('Loi d\'Ohm')">Loi d'Ohm</button>
            <button class="tab-btn" onclick="sendQuick('Moteur Asynchrone')">Moteur Asynchrone</button>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" placeholder="Posez votre question technique..." rows="1" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="handleSend()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: EXAMS (EXTENDED) -->
  <div class="tab-panel" id="panel-exams">
    <div class="exam-grid" id="exam-grid">
      <!-- Exams injected here -->
    </div>
  </div>

  <!-- TAB: SIMULATOR -->
  <div class="tab-panel" id="panel-simulator">
    <div class="sim-container">
      <div class="sim-canvas-area">
        <canvas id="sim-canvas" style="width:100%; height:100%;"></canvas>
      </div>
      <div class="sim-controls">
        <h3 id="txt-sim-params">Paramètres du Circuit</h3>
        <div class="sim-param">
          <div class="sim-label"><span id="txt-sim-u">Tension (U)</span> <span id="val-u">12 V</span></div>
          <input type="range" class="sim-slider" id="slider-u" min="0" max="230" value="12" oninput="updateSim()">
        </div>
        <div class="sim-param">
          <div class="sim-label"><span id="txt-sim-r">Résistance (R)</span> <span id="val-r">100 Ω</span></div>
          <input type="range" class="sim-slider" id="slider-r" min="1" max="1000" value="100" oninput="updateSim()">
        </div>
        <div class="sim-stats">
          <div class="stat-item"><span id="txt-sim-i">Intensité (I)</span> <span class="stat-val" id="val-i">0.12 A</span></div>
          <div class="stat-item"><span id="txt-sim-p">Puissance (P)</span> <span class="stat-val" id="val-p">1.44 W</span></div>
        </div>
        <button class="tab-btn active" style="width:100%; justify-content:center;" onclick="addSimScore()">✅ Valider l'expérience (+20 pts)</button>
      </div>
    </div>
  </div>

  <!-- TAB: VIDEOS -->
  <div class="tab-panel" id="panel-videos">
    <div class="vlib-grid" id="video-grid"></div>
  </div>

  <!-- TAB: EXERCISES -->
  <div class="tab-panel" id="panel-exercises">
    <div id="exercise-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; padding:20px;"></div>
  </div>

</div>

<script>
let currentLang = 'fr';
let userScore = parseInt(localStorage.getItem('ofppt_score') || '0');

const translations = {
  fr: {
    appTitle: "Assistant OFPPT Ultra", appSub: "GE & GEn • Plateforme Intelligente",
    tabChat: "Chat IA", tabSim: "Simulateur", tabVideos: "Vidéos", tabEx: "Exercices", tabExams: "Examens",
    welcomeTitle: "Bienvenue sur l'Assistant OFPPT", welcomeDesc: "Posez vos questions techniques sur le Génie Électrique ou Énergétique.",
    simParams: "Paramètres du Circuit", simU: "Tension (U)", simR: "Résistance (R)", simI: "Intensité (I)", simP: "Puissance (P)", simLive: "⚡ Temps réel",
    correct: "✅ Correct !", incorrect: "❌ Incorrect !", scoreAdded: "Points ajoutés ! Total: ",
    viewExam: "Voir l'examen", download: "Télécharger"
  },
  ar: {
    appTitle: "مساعد OFPPT الفائق", appSub: "GE & GEn • منصة ذكية",
    tabChat: "محادثة", tabSim: "المحاكي", tabVideos: "فيديوهات", tabEx: "تمارين", tabExams: "امتحانات",
    welcomeTitle: "مرحباً بك في مساعد OFPPT", welcomeDesc: "اطرح أسئلتك التقنية حول الهندسة الكهربائية أو هندسة الطاقة.",
    simParams: "بارامترات الدارة", simU: "الجهد (U)", simR: "المقاومة (R)", simI: "التيار (I)", simP: "القدرة (P)", simLive: "⚡ محاكاة مباشرة",
    correct: "✅ صحيح !", incorrect: "❌ خطأ !", scoreAdded: "تمت إضافة النقاط! المجموع: ",
    viewExam: "عرض الامتحان", download: "تحميل"
  }
};

const examData = [
  { type: "EFM", title: "EFM 2024 - Électricité Industrielle", module: "M201", spec: "GE", year: "2024" },
  { type: "EFE", title: "EFE 2023 - Automatisme & PLC", module: "M105", spec: "GE", year: "2023" },
  { type: "EFM", title: "EFM 2024 - Solaire Photovoltaïque", module: "M302", spec: "GEn", year: "2024" },
  { type: "EFM", title: "EFM 2023 - Froid Commercial", module: "M401", spec: "Froid", year: "2023" },
  { type: "EFE", title: "EFE 2022 - Électronique de Puissance", module: "M205", spec: "GE", year: "2022" },
  { type: "EFM", title: "EFM 2024 - Climatisation", module: "M405", spec: "CVC", year: "2024" },
  { type: "EFM", title: "EFM 2023 - Installation Domotique", module: "M108", spec: "GE", year: "2023" },
  { type: "EFE", title: "EFE 2023 - Maintenance Électrique", module: "M210", spec: "GE", year: "2023" }
];

const videoData = [
  { title: "Moteur Asynchrone", tag: "GE", thumb: "https://img.youtube.com/vi/AQqyG7raVAY/maxresdefault.jpg", url: "https://www.youtube.com/embed/AQqyG7raVAY" },
  { title: "Installation Solaire", tag: "GEn", thumb: "https://img.youtube.com/vi/09p6UqSjWio/maxresdefault.jpg", url: "https://www.youtube.com/embed/09p6UqSjWio" }
];

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('btn-lang-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-lang-ar').classList.toggle('active', lang === 'ar');
  const t = translations[lang];
  for (let id in t) { if(document.getElementById('txt-'+id)) document.getElementById('txt-'+id).textContent = t[id]; }
  renderExams();
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabs-bar .tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tabId).classList.add('active');
  btn.classList.add('active');
  if (tabId === 'simulator') setTimeout(initSim, 100);
}

function renderExams() {
  const grid = document.getElementById('exam-grid');
  grid.innerHTML = '';
  examData.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = `
      <div class="exam-header">
        <span class="exam-badge badge-${ex.type.toLowerCase()}">${ex.type}</span>
        <span style="font-size:11px; color:var(--accent3);">${ex.spec}</span>
      </div>
      <h4 class="exam-title">${ex.title}</h4>
      <p class="exam-meta">Module: ${ex.module} • ${ex.year}</p>
      <button class="tab-btn active" style="width:100%; justify-content:center;" onclick="showToast('Chargement...')">${translations[currentLang].viewExam}</button>
    `;
    grid.appendChild(card);
  });
}

function handleSend() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  setTimeout(() => appendMessage('bot', "Je suis votre assistant spécialisé OFPPT. Posez-moi une question technique !"), 800);
}

function appendMessage(role, content) {
  const container = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="avatar">${role==='user'?'👤':'⚡'}</div><div class="msg-bubble">${content}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function sendQuick(t) { document.getElementById('chat-input').value = t; handleSend(); }

// SIMULATOR
let simCtx, simCanvas, electronPos = 0;
function initSim() {
  simCanvas = document.getElementById('sim-canvas');
  simCtx = simCanvas.getContext('2d');
  simCanvas.width = simCanvas.offsetWidth;
  simCanvas.height = simCanvas.offsetHeight;
  requestAnimationFrame(drawLoop);
}
function updateSim() {
  const u = document.getElementById('slider-u').value, r = document.getElementById('slider-r').value;
  const i = u / r, p = u * i;
  document.getElementById('val-u').textContent = u + " V";
  document.getElementById('val-r').textContent = r + " Ω";
  document.getElementById('val-i').textContent = i.toFixed(3) + " A";
  document.getElementById('val-p').textContent = p.toFixed(2) + " W";
}
function drawLoop() {
  if (!simCtx) return;
  const u = document.getElementById('slider-u').value, r = document.getElementById('slider-r').value, i = u / r;
  simCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
  const cx = simCanvas.width/2, cy = simCanvas.height/2, w = 240, h = 160;
  simCtx.strokeStyle = '#2d3a52'; simCtx.lineWidth = 4; simCtx.strokeRect(cx-w/2, cy-h/2, w, h);
  electronPos += i * 5; if (electronPos > (w+h)*2) electronPos = 0;
  drawE(cx, cy, w, h, electronPos);
  requestAnimationFrame(drawLoop);
}
function drawE(cx, cy, w, h, p) {
  let x, y;
  if (p < w) { x = cx-w/2+p; y = cy-h/2; } else if (p < w+h) { x = cx+w/2; y = cy-h/2+(p-w); }
  else if (p < 2*w+h) { x = cx+w/2-(p-(w+h)); y = cy+h/2; } else { x = cx-w/2; y = cy+h/2-(p-(2*w+h)); }
  simCtx.fillStyle = '#facc15'; simCtx.beginPath(); simCtx.arc(x, y, 4, 0, 7); simCtx.fill();
}

function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function addSimScore() { userScore += 20; localStorage.setItem('ofppt_score', userScore); showToast(translations[currentLang].scoreAdded + userScore); }

document.addEventListener('DOMContentLoaded', () => { setLang('fr'); updateSim(); });
</script>
</body>
</html>
