<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Assistant OFPPT Ultra - Stady ⚡</title>
<!-- PWA & SEO -->
<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1117'/><text y='.9em' font-size='80'>⚡</text></svg>">

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');

:root {
  --bg:#0b0f1a; --surface:#111827; --surface2:#1a2234;
  --border:#2d3a52; --accent:#00d084; --accent-dark:#00a366;
  --accent2:#38bdf8; --text:#e6edf3; --muted:#8b949e;
  --vh: 1vh;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter', 'Tajawal', sans-serif;
  background:var(--bg);
  color:var(--text);
  height: calc(var(--vh, 1vh) * 100);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position: fixed;
  width: 100%;
}

/* HEADER */
.header{background:linear-gradient(135deg,#0b0f1a,#111827);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:200;backdrop-filter:blur(20px);flex-shrink:0;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#c9271e,#006233);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 15px rgba(0,208,132,0.15);flex-shrink:0;}
.header-info h1{font-size:16px;font-weight:700;color:var(--accent);}
.header-spacer{flex:1;}

/* AUTH BUTTON */
.auth-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;transition:0.2s;}
.auth-btn:hover{background:var(--border);}
.user-profile{display:none;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;border:1px solid var(--accent);}

/* TABS BAR */
.tabs-bar{display:flex;gap:4px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;white-space:nowrap;z-index:150;flex-shrink:0;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:rgba(0,208,132,0.1);border-color:rgba(0,208,132,0.3);color:var(--accent);}

/* MAIN CONTAINER */
.main-container{flex:1;display:flex;overflow:hidden;position:relative;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow-y:auto;width:100%;padding-bottom:20px;}
.tab-panel.active{display:flex;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(13,17,23,0.5);}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.msg{display:flex;gap:12px;animation:fadeInUp 0.3s ease;align-items:flex-end;max-width:90%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.msg-bubble{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word;position:relative;max-width:100%;}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(0,208,132,0.15),rgba(34,211,238,0.1));border:1.5px solid rgba(0,208,132,0.3);border-bottom-right-radius:4px;color:var(--text);}
.msg.bot  .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 4px 15px rgba(0,0,0,0.25);}
.avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.msg.bot .avatar{background:linear-gradient(135deg,#1a3a2a,#0a2535);border:1px solid var(--accent);}
.msg.user .avatar{background:linear-gradient(135deg,#c9271e,#006233);}

/* INPUT AREA - MOBILE FIXED */
.input-area{padding:12px 16px 55px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.input-wrapper{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 14px;}
.input-wrapper textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;resize:none;max-height:120px;line-height:1.5;}
.send-btn{width:38px;height:38px;border-radius:10px;background:var(--accent);border:none;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* EXAM BANK */
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:16px;padding:20px;}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.exam-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;background:rgba(34,211,238,0.1);color:var(--accent2);}

/* SIMULATOR */
.sim-container{display:flex;flex:1;overflow-y:auto;padding:20px;gap:20px;flex-wrap:wrap;}
.sim-canvas-area{flex:2;min-width:300px;min-height:300px;background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sim-controls{flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:20px;}
.sim-slider{width:100%;accent-color:var(--accent);cursor:pointer;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚡</div>
  <div class="header-info">
    <h1 id="txt-appTitle">Assistant OFPPT Ultra - Stady</h1>
  </div>
  <div class="header-spacer"></div>
  
  <!-- AUTH SECTION -->
  <div id="auth-section">
    <button class="auth-btn" id="btn-login">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
      <span id="txt-login">Login</span>
    </button>
    <div class="user-profile" id="user-profile">
      <img class="user-avatar" id="user-img" src="">
      <button class="auth-btn" id="btn-logout" style="padding:4px 8px;">✕</button>
    </div>
  </div>

  <div class="lang-selector" style="display:flex; gap:4px; margin-left:10px;">
    <button class="tab-btn active" style="padding:4px 8px;" onclick="setLang('fr')">FR</button>
    <button class="tab-btn" style="padding:4px 8px;" onclick="setLang('ar')">AR</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('chat', this)">💬 <span id="txt-tabChat">Chat IA</span></button>
  <button class="tab-btn" onclick="switchTab('exams', this)">📄 <span id="txt-tabExams">Examens</span></button>
  <button class="tab-btn" onclick="switchTab('simulator', this)">🔧 <span id="txt-tabSim">Simulateur</span></button>
  <button class="tab-btn" onclick="switchTab('videos', this)">🎥 <span id="txt-tabVideos">Vidéos</span></button>
</div>

<!-- MAIN -->
<div class="main-container">
  <div class="tab-panel active" id="panel-chat">
    <div class="chat-area">
      <div class="messages" id="chat-messages">
        <div style="text-align:center; padding:40px 20px;">
          <h2 id="txt-welcomeTitle" style="color:var(--accent); margin-bottom:10px;">Bienvenue sur l'Assistant OFPPT</h2>
          <p id="txt-welcomeDesc" style="color:var(--muted);">Posez vos questions techniques sur le Génie Électrique.</p>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" placeholder="Posez votre question..." rows="1" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="btn-send" onclick="handleSend()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-exams">
    <div class="exam-grid" id="exam-grid"></div>
  </div>

  <div class="tab-panel" id="panel-simulator">
    <div class="sim-container">
      <div class="sim-canvas-area"><canvas id="sim-canvas"></canvas></div>
      <div class="sim-controls">
        <h3 id="txt-simParams">Paramètres</h3>
        <input type="range" class="sim-slider" id="slider-u" min="0" max="230" value="12" oninput="updateSim()">
        <div id="val-u">12 V</div>
        <input type="range" class="sim-slider" id="slider-r" min="1" max="1000" value="100" oninput="updateSim()">
        <div id="val-r">100 Ω</div>
        <div style="margin-top:20px; font-weight:bold; color:var(--accent2);" id="val-i">I: 0.12 A</div>
      </div>
    </div>
  </div>
</div>

<!-- FIREBASE & LOGIC -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

  // CONFIGURATION FIREBASE COMPLETE - PLUG & PLAY
  const firebaseConfig = {
    apiKey: "AIzaSyDGNvJ6XVSY9dqWi3vZedHLgC-kI5fF22I",
    authDomain: "ai-study-ac136.firebaseapp.com",
    projectId: "ai-study-ac136",
    storageBucket: "ai-study-ac136.firebasestorage.app",
    messagingSenderId: "1048496433177",
    appId: "1:1048496433177:web:7d0a8c3a1b46a9defb2288",
    measurementId: "G-DFB8HYLRJ0"
  };

  // INITIALISATION
  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getFirestore(app);
  window.analytics = getAnalytics(app);
  const provider = new GoogleAuthProvider();

  // AUTH LOGIC
  const loginBtn = document.getElementById('btn-login');
  const logoutBtn = document.getElementById('btn-logout');
  const userProfile = document.getElementById('user-profile');
  const userImg = document.getElementById('user-img');

  loginBtn.onclick = async () => {
    try {
      const result = await signInWithPopup(window.auth, provider);
      const user = result.user;
      // Sauvegarde Firestore
      await setDoc(doc(window.db, "users", user.uid), {
        name: user.displayName,
        email: user.email,
        photo: user.photoURL,
        lastLogin: new Date()
      }, { merge: true });
    } catch (e) {
      if (e.code === 'auth/unauthorized-domain') {
        alert("Erreur: Domaine non autorisé. Ajoutez 'ai-study-ac136.web.app' dans la console Firebase.");
      } else {
        console.error(e);
      }
    }
  };

  logoutBtn.onclick = () => signOut(window.auth);

  onAuthStateChanged(window.auth, (user) => {
    if (user) {
      loginBtn.style.display = 'none';
      userProfile.style.display = 'flex';
      userImg.src = user.photoURL;
    } else {
      loginBtn.style.display = 'flex';
      userProfile.style.display = 'none';
    }
  });

  // CHAT & GROQ LOGIC
  const GROQ_API_KEY = atob("Z3NrX0l2VnJEcEUxczYzZlF5TllraU1iV0dyeWIzRllTdDM0Y20xcFc3cTFaWVNNT3NwRFBxS2c=");
  const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
  let chatHistory = [{ role: "system", content: "Assistant OFPPT spécialisé en Génie Électrique. Réponds de manière structurée avec LaTeX." }];

  window.handleSend = async function() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    appendMsg('user', text);
    input.value = '';
    
    chatHistory.push({ role: "user", content: text });
    try {
      const res = await fetch(GROQ_URL, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: "llama3-8b-8192", messages: chatHistory })
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;
      appendMsg('bot', reply);
      chatHistory.push({ role: "assistant", content: reply });
    } catch(e) { appendMsg('bot', "Erreur de connexion."); }
  };

  function appendMsg(role, content) {
    const container = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    msg.innerHTML = `<div class="avatar">${role==='user'?'👤':'⚡'}</div><div class="msg-bubble">${content}</div>`;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    if (window.renderMathInElement) renderMathInElement(msg, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });
  }
</script>

<script>
// VIEWPORT & UI
const updateVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', updateVH); updateVH();

let currentLang = 'fr';
const translations = {
  fr: { 
    appTitle: "Assistant OFPPT Ultra - Stady", tabChat: "Chat IA", tabExams: "Examens", tabSim: "Simulateur", tabVideos: "Vidéos", 
    welcomeTitle: "Bienvenue sur l'Assistant OFPPT", welcomeDesc: "Posez vos questions techniques sur le Génie Électrique.", 
    login: "Login", simParams: "Paramètres"
  },
  ar: { 
    appTitle: "مساعد OFPPT - Stady", tabChat: "محادثة", tabExams: "امتحانات", tabSim: "المحاكي", tabVideos: "فيديوهات", 
    welcomeTitle: "مرحباً", welcomeDesc: "اطرح أسئلتك التقنية.", 
    login: "دخول", simParams: "بارامترات"
  }
};

window.setLang = function(lang) {
  currentLang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const t = translations[lang];
  for (let id in t) { if(document.getElementById('txt-'+id)) document.getElementById('txt-'+id).textContent = t[id]; }
  renderExams();
};

window.switchTab = function(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tabId).classList.add('active');
  btn.classList.add('active');
};

const examData = [{ type: "EFM", title: "EFM 2024 - Électricité", module: "M201", spec: "GE" }, { type: "EFE", title: "EFE 2023 - Automatisme", module: "M105", spec: "GE" }];
function renderExams() {
  const grid = document.getElementById('exam-grid');
  grid.innerHTML = examData.map(ex => `<div class="exam-card"><span class="exam-badge">${ex.type}</span><h4>${ex.title}</h4><p>${ex.module}</p></div>`).join('');
}

window.autoResize = function(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };

// SIMULATOR
let simCtx, simCanvas, electronPos = 0;
function initSim() {
  simCanvas = document.getElementById('sim-canvas');
  simCtx = simCanvas.getContext('2d');
  simCanvas.width = simCanvas.offsetWidth; simCanvas.height = simCanvas.offsetHeight;
  requestAnimationFrame(drawLoop);
}
window.updateSim = function() {
  const u = document.getElementById('slider-u').value, r = document.getElementById('slider-r').value;
  document.getElementById('val-u').textContent = u + " V";
  document.getElementById('val-r').textContent = r + " Ω";
  document.getElementById('val-i').textContent = "I: " + (u/r).toFixed(3) + " A";
};
function drawLoop() {
  if (!simCtx) return;
  simCtx.clearRect(0,0,simCanvas.width,simCanvas.height);
  const u = document.getElementById('slider-u').value, r = document.getElementById('slider-r').value;
  const cx = simCanvas.width/2, cy = simCanvas.height/2, w = 200, h = 120;
  simCtx.strokeStyle = '#2d3a52'; simCtx.lineWidth = 4; simCtx.strokeRect(cx-w/2, cy-h/2, w, h);
  electronPos += (u/r) * 5; if (electronPos > (w+h)*2) electronPos = 0;
  let x, y, p = electronPos;
  if (p < w) { x = cx-w/2+p; y = cy-h/2; } else if (p < w+h) { x = cx+w/2; y = cy-h/2+(p-w); }
  else if (p < 2*w+h) { x = cx+w/2-(p-(w+h)); y = cy+h/2; } else { x = cx-w/2; y = cy+h/2-(p-(2*w+h)); }
  simCtx.fillStyle = '#facc15'; simCtx.beginPath(); simCtx.arc(x,y,4,0,7); simCtx.fill();
  requestAnimationFrame(drawLoop);
}

document.addEventListener('DOMContentLoaded', () => { setLang('fr'); initSim(); });
</script>
</body>
</html>
